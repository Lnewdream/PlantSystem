<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多作物病害知识与防治系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- 导航 -->
    <nav class="flex items-center justify-between px-10 h-16 border-b border-white/5 bg-[#030712] fixed top-0 w-full z-50">
        <div class="flex items-center gap-3">
            <div class="w-6 h-6 bg-green-500 rounded flex items-center justify-center">
                <i data-lucide="leaf" class="text-white w-4 h-4"></i>
            </div>
            <h1 class="text-lg font-bold tracking-tight">植物病害知识与防治系统</h1>
        </div>

        <div class="flex gap-12" id="nav-menu">
            <button data-target="home" class="nav-btn active-nav">诊断中心</button>
            <button data-target="library" class="nav-btn">病健百科</button>
            <button data-target="system" class="nav-btn">防管记录</button>
        </div>
        <div class="flex items-center gap-2 text-[10px] text-slate-500 uppercase tracking-widest">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
            在线就绪
        </div>
    </nav>
    <main class="pt-24 px-10 max-w-[1600px] mx-auto pb-10 relative">
        <div id="view-home" class="page-view active-view space-y-8">
            <h2 class="text-2xl font-bold text-white mb-4">欢迎来到诊断中心</h2>
            <p class="text-slate-400"></p>
        </div>
        <div id="view-library" class="page-view space-y-8">
            <h2 class="text-2xl font-bold text-white mb-4">作物病健百科库</h2>

        </div>

        <div id="view-system" class="page-view space-y-8">
            <h2 class="text-2xl font-bold text-white mb-4">历史防管与农事记录</h2>
            <div id="record-list" class="space-y-4">

            </div>
        </div>

    </main>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
